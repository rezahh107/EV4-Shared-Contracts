name: Temporary Positive Proof Diagnostics

on:
  pull_request:

permissions:
  contents: read

jobs:
  pytest-diagnostics:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout exact Project Gate source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
          persist-credentials: false
          show-progress: false

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          version: "0.7.22"
          enable-cache: true

      - name: Run pytest and retain complete diagnostics
        shell: bash
        run: |
          set +e
          uv sync --locked --extra dev --extra ui --quiet
          uv run pytest -q --tb=short --maxfail=50 > pytest.log 2>&1
          status=$?
          echo "$status" > pytest-status.txt
          exit 0

      - name: Upload diagnostic log
        uses: actions/upload-artifact@v4
        with:
          name: positive-proof-pytest-diagnostics
          path: |
            pytest.log
            pytest-status.txt
          if-no-files-found: error
          retention-days: 1
