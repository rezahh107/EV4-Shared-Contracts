name: Prompt 06 Report UX

on:
  pull_request:
  push:
    branches:
      - project-gate-prompt-06-ux
      - project-gate-prompt-06-ui-uxis-dmds-completion

permissions:
  contents: read

jobs:
  report-ux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout exact source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          persist-credentials: false

      - name: Verify exact source head
        env:
          EXPECTED_HEAD_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
        run: |
          actual_head="$(git rev-parse HEAD)"
          test "$actual_head" = "$EXPECTED_HEAD_SHA"
          echo "Prompt 06 tested source head $actual_head" >> "$GITHUB_STEP_SUMMARY"

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          version: "0.7.22"
          enable-cache: true

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version-file: .python-version

      - name: Verify uv lockfile
        run: uv lock --check

      - name: Install package
        run: uv sync --locked --extra dev --extra ui

      - name: Operator UI service integration tests
        run: uv run pytest tests/ui

      - name: Service layer tests
        run: uv run pytest tests/service

      - name: Report UX acceptance tests
        run: uv run pytest tests/ux_acceptance

      - name: Typography acceptance tests
        run: uv run pytest tests/typography_acceptance

      - name: Theme acceptance tests
        run: uv run pytest tests/theme_acceptance

      - name: Reporting tests
        run: uv run pytest tests/reporting

      - name: Atomic writer tests
        run: uv run pytest tests/reporting/test_output_writer.py

      - name: Behavioral coverage validator
        run: |
          uv run python scripts/validate-behavioral-rule-coverage.py docs/BEHAVIORAL_RULE_COVERAGE.md
          uv run ev4-transition coverage validate docs/BEHAVIORAL_RULE_COVERAGE.md
