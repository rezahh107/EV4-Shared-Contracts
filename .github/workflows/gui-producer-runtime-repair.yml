name: GUI Producer Runtime Repair

on:
  pull_request:
    paths:
      - "src/ev4_transition/**"
      - "scripts/**"
      - "tests/**"
      - "docs/GUI_PRODUCER_A2C_OPERATOR_GUIDE.md"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/gui-producer-runtime-repair.yml"
      - ".github/workflows/ui-runtime-smoke.yml"

permissions:
  contents: read

jobs:
  repair-tests:
    runs-on: ubuntu-latest
    env:
      EVIDENCE_DIR: ${{ runner.temp }}/ev4-gui-producer-repair-evidence
    steps:
      - name: Checkout exact PR head
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false

      - name: Verify exact tested head
        env:
          EXPECTED_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          actual_head="$(git rev-parse HEAD)"
          test "$actual_head" = "$EXPECTED_HEAD_SHA"
          mkdir -p "$EVIDENCE_DIR"
          printf '%s\n' "$actual_head" > "$EVIDENCE_DIR/tested-head-sha.txt"

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          version: "0.7.22"
          enable-cache: true

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version-file: .python-version

      - name: Verify lock and install package
        run: |
          uv lock --check
          uv sync --locked --extra dev --extra ui

      - name: Static and focused invariant tests
        shell: bash
        run: |
          set +e
          uv run pytest \
            tests/ui \
            tests/service \
            tests/producer_integration \
            tests/boundary/test_runner_boundary_static.py \
            tests/boundary/test_import_purity.py \
            tests/boundary/test_native_ui_runners.py \
            tests/boundary/test_evidence_packaging.py \
            tests/test_cli_final_gate_kernel_repo.py \
            -vv --junitxml="$EVIDENCE_DIR/focused-junit.xml" \
            2>&1 | tee "$EVIDENCE_DIR/focused-tests.log"
          code=${PIPESTATUS[0]}
          exit "$code"

      - name: Full repository tests
        shell: bash
        run: |
          set +e
          uv run pytest -vv --junitxml="$EVIDENCE_DIR/full-junit.xml" 2>&1 | tee "$EVIDENCE_DIR/full-tests.log"
          code=${PIPESTATUS[0]}
          exit "$code"

      - name: Build Gradio demo without launch
        run: |
          uv run python -c "from ev4_transition.ui.app import build_demo; build_demo(); print('UI_BUILD_OK')" \
            | tee "$EVIDENCE_DIR/ui-build.log"

      - name: Build installable wheel
        run: |
          mkdir -p "$EVIDENCE_DIR/dist"
          uv build --wheel --out-dir "$EVIDENCE_DIR/dist" --python "$(command -v python)" --no-python-downloads
          ls -l "$EVIDENCE_DIR/dist" | tee "$EVIDENCE_DIR/wheel-build.log"

      - name: Clean-install and import packaged UI and runners
        shell: bash
        run: |
          CLEAN_VENV="$RUNNER_TEMP/ev4-clean-install"
          uv venv "$CLEAN_VENV"
          wheel_path="$(find "$EVIDENCE_DIR/dist" -maxdepth 1 -name '*.whl' -print -quit)"
          test -n "$wheel_path"
          uv pip install --python "$CLEAN_VENV/bin/python" "$wheel_path" "gradio>=4,<6"
          (
            cd "$RUNNER_TEMP"
            "$CLEAN_VENV/bin/python" - <<'PY'
          from ev4_transition.runners.native_dialog import select_directory
          from ev4_transition.runners.open_output_folder import open_directory
          from ev4_transition.ui.app import build_demo

          demo = build_demo()
          assert demo is not None
          assert select_directory is not None
          assert open_directory is not None
          print("CLEAN_INSTALL_IMPORT_OK")
          PY
          ) | tee "$EVIDENCE_DIR/clean-install.log"

      - name: Package exact-head source evidence outside checkout
        if: always()
        env:
          TESTED_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          mkdir -p "$EVIDENCE_DIR/source"
          uv run python scripts/package-ci-evidence.py \
            --source "$GITHUB_WORKSPACE" \
            --archive "$EVIDENCE_DIR/source/pr-head-source.tar.gz" \
            --manifest "$EVIDENCE_DIR/source/source-evidence-manifest.json" \
            --tested-head-sha "$TESTED_HEAD_SHA" \
            | tee "$EVIDENCE_DIR/source/source-packaging.log"
          test -s "$EVIDENCE_DIR/source/pr-head-source.tar.gz"
          test -s "$EVIDENCE_DIR/source/source-evidence-manifest.json"

      - name: Upload exact-head repair evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: gui-producer-runtime-repair-evidence-${{ github.event.pull_request.head.sha }}
          path: ${{ env.EVIDENCE_DIR }}
          if-no-files-found: error
          retention-days: 14
