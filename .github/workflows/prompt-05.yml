name: Prompt 05 Builder Responsive Final Gate

on:
  pull_request:
  push:
    branches:
      - project-gate-prompt-05-builder-responsive-final-gate
      - fix/prompt-05-foundation-reconciliation
  workflow_dispatch:
    inputs:
      expected_head_sha:
        description: Exact commit SHA that this dispatched run must validate.
        required: true
        type: string

permissions:
  contents: read

jobs:
  prompt-05:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout Project Gate
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          path: EV4-Project-Gate
          fetch-depth: 0
          persist-credentials: false

      - name: Assert exact Project Gate PR head
        if: github.event_name == 'pull_request'
        run: test "$(git -C EV4-Project-Gate rev-parse HEAD)" = "${{ github.event.pull_request.head.sha }}"

      - name: Record Project Gate source identity
        run: git -C EV4-Project-Gate rev-parse HEAD > EV4-Project-Gate/prompt-05-exact-tested-sha.txt

      - name: Verify dispatched exact head
        if: github.event_name == 'workflow_dispatch'
        env:
          EXPECTED_HEAD_SHA: ${{ inputs.expected_head_sha }}
          TESTED_SHA: ${{ github.sha }}
        run: test "$TESTED_SHA" = "$EXPECTED_HEAD_SHA"

      - name: Checkout pinned Builder owner repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          repository: rezahh107/EV4-Builder-Assistant-Repo
          ref: 69a2c61edf6d06b4418ad770fcefbfdffcf275d6
          path: EV4-Builder-Assistant-Repo
          persist-credentials: false

      - name: Checkout pinned Responsive owner repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          repository: rezahh107/EV4-Responsive-Architect
          ref: df74c7ba2ffbed1a4136b5ea6be6ce30db4e161a
          path: EV4-Responsive-Architect
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          version: "0.7.22"
          enable-cache: true

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version-file: EV4-Project-Gate/.python-version

      - name: Verify uv lockfile
        working-directory: EV4-Project-Gate
        run: uv lock --check

      - name: Install package
        working-directory: EV4-Project-Gate
        run: uv sync --locked --extra dev --extra ui

      - name: Verify action pins
        working-directory: EV4-Project-Gate
        run: uv run python scripts/check-github-action-pinning.py

      - name: Verify workflow permissions
        working-directory: EV4-Project-Gate
        run: uv run python scripts/check-workflow-permissions.py

      - name: Verify capability truth
        working-directory: EV4-Project-Gate
        run: uv run python scripts/check-capability-truth.py

      - name: Prompt-05 syntax and JSON checks
        working-directory: EV4-Project-Gate
        run: |
          uv run python -m py_compile \
            src/ev4_transition/progress.py \
            src/ev4_transition/runners/responsive_tools.py \
            src/ev4_transition/transitions/builder_to_responsive.py \
            src/ev4_transition/transitions/final_gate.py \
            scripts/compute-builder-to-responsive-lock.py \
            scripts/compute-final-gate-lock.py
          uv run python -m json.tool schemas/builder-to-responsive-transition-result/builder-to-responsive-transition-result.v1.schema.json >/dev/null
          uv run python -m json.tool schemas/final-gate-result/final-gate-result.v1.schema.json >/dev/null
          uv run python -m json.tool contracts/locks/builder-to-responsive-transition.v1.lock.json >/dev/null
          uv run python -m json.tool contracts/locks/final-gate.v1.lock.json >/dev/null

      - name: Prompt-05 transition and capability tests
        working-directory: EV4-Project-Gate
        run: |
          set +e
          set -o pipefail
          uv run pytest -q \
            tests/test_contract_source.py \
            tests/transitions/test_builder_to_responsive.py \
            tests/transitions/test_final_gate.py \
            tests/test_cli.py 2>&1 | tee prompt-05-pytest.log
          status=${PIPESTATUS[0]}
          set -e
          printf '%s\n' "$status" > prompt-05-pytest.exit-code
          exit "$status"

      - name: Recompute and compare immutable locks
        working-directory: EV4-Project-Gate
        run: |
          set +e
          status=0
          uv run python scripts/compute-builder-to-responsive-lock.py \
            --builder-repo ../EV4-Builder-Assistant-Repo \
            --responsive-repo ../EV4-Responsive-Architect \
            --output /tmp/b2r-lock.json || status=$?
          if [ "$status" -eq 0 ]; then
            cmp /tmp/b2r-lock.json contracts/locks/builder-to-responsive-transition.v1.lock.json || status=$?
          fi
          if [ "$status" -eq 0 ]; then
            uv run python scripts/compute-final-gate-lock.py \
              --project-gate-repo . \
              --responsive-repo ../EV4-Responsive-Architect \
              --output /tmp/final-lock.json || status=$?
          fi
          if [ "$status" -eq 0 ]; then
            cmp /tmp/final-lock.json contracts/locks/final-gate.v1.lock.json || status=$?
          fi
          printf '%s\n' "$status" > prompt-05-locks.exit-code
          if [ "$status" -eq 0 ]; then
            sha256sum /tmp/b2r-lock.json /tmp/final-lock.json > prompt-05-locks.sha256
          fi
          exit "$status"

      - name: Run pinned official Responsive validators
        working-directory: EV4-Responsive-Architect
        env:
          PROJECT_GATE_PYTHON: ${{ github.workspace }}/EV4-Project-Gate/.venv/bin/python
        run: |
          "$PROJECT_GATE_PYTHON" validation/e2e/run_builder_responsive_input_boundary_check.py
          "$PROJECT_GATE_PYTHON" validation/e2e/run_responsive_tree_architecture_refactor_check.py

      - name: Upload recomputed lock evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: prompt-05-recomputed-locks
          path: |
            /tmp/b2r-lock.json
            /tmp/final-lock.json
            EV4-Project-Gate/prompt-05-exact-tested-sha.txt
            EV4-Project-Gate/prompt-05-pytest.log
            EV4-Project-Gate/prompt-05-pytest.exit-code
            EV4-Project-Gate/prompt-05-locks.exit-code
            EV4-Project-Gate/prompt-05-locks.sha256
          if-no-files-found: ignore
          retention-days: 14

      - name: Record exact head
        run: |
          TESTED_SHA="$(git -C EV4-Project-Gate rev-parse HEAD)"
          echo "Prompt-05 validated source head ${TESTED_SHA}" >> "$GITHUB_STEP_SUMMARY"
