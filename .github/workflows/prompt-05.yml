name: Prompt 05 Builder Responsive Final Gate

on:
  pull_request:
  push:
    branches:
      - project-gate-prompt-05-builder-responsive-final-gate

jobs:
  prompt-05:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Project Gate
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.11'

      - name: Install package
        run: python -m pip install -e '.[dev]'

      - name: Python syntax checks for Prompt-05 files
        run: |
          python -m py_compile \
            src/ev4_transition/progress.py \
            src/ev4_transition/runners/responsive_tools.py \
            src/ev4_transition/transitions/builder_to_responsive.py \
            src/ev4_transition/transitions/final_gate.py \
            scripts/compute-builder-to-responsive-lock.py \
            scripts/compute-final-gate-lock.py \
            tests/transitions/test_builder_to_responsive.py \
            tests/transitions/test_final_gate.py

      - name: JSON parsing checks for Prompt-05 files
        run: |
          python -m json.tool schemas/builder-to-responsive-transition-result/builder-to-responsive-transition-result.v1.schema.json >/dev/null
          python -m json.tool schemas/final-gate-result/final-gate-result.v1.schema.json >/dev/null
          python -m json.tool contracts/locks/builder-to-responsive-transition.v1.lock.json >/dev/null
          python -m json.tool contracts/locks/final-gate.v1.lock.json >/dev/null
          python -m json.tool tests/fixture_matrix/builder_to_responsive/valid/builder_responsive_input.valid.json >/dev/null
          python -m json.tool tests/fixture_matrix/builder_to_responsive/invalid/missing_mobile_evidence.invalid.json >/dev/null
          python -m json.tool tests/fixture_matrix/builder_to_responsive/invalid/forbidden_claim.invalid.json >/dev/null

      - name: Prompt-05 transition tests
        run: pytest tests/transitions/test_builder_to_responsive.py tests/transitions/test_final_gate.py

      - name: Prompt-05 lock compute smoke
        run: |
          python scripts/compute-builder-to-responsive-lock.py --root . --output b2r-lock-computed.json
          python scripts/compute-final-gate-lock.py --root . --output final-lock-computed.json
          python -m json.tool b2r-lock-computed.json >/dev/null
          python -m json.tool final-lock-computed.json >/dev/null

      - name: Document live specialist checkout limitation
        run: |
          echo "Prompt-05 exact owner lock refresh and live Responsive validator smoke require specialist checkouts."
          echo "Until exact hashes are refreshed, Prompt-05 lock manifests intentionally remain fail-closed."
