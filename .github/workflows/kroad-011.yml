name: KROAD-011 Project Gate Intake

on:
  pull_request:
    paths:
      - ".github/workflows/kroad-011.yml"
      - ".github/workflows/validate.yml"
      - "README.md"
      - "contracts/locks/kernel-decision-intake.v1.lock.json"
      - "docs/IMPLEMENTATION_STATUS.yaml"
      - "docs/KROAD_011_PROJECT_GATE_INTAKE.md"
      - "fixtures/kernel-decision-intake/**"
      - "planning/DECISION_ESCAPE_ROUTES.yml"
      - "planning/decision-escape-routes.schema.json"
      - "schemas/kernel-decision-intake/**"
      - "schemas/kernel-decision-intake-result/**"
      - "scripts/check-capability-truth.py"
      - "scripts/compute-kernel-decision-intake-lock.py"
      - "scripts/kernel-decision-intake-bridge.mjs"
      - "src/ev4_transition/cli.py"
      - "src/ev4_transition/data/capability-status.v1.json"
      - "src/ev4_transition/kernel_decision_*.py"
      - "src/ev4_transition/runners/kernel_decision.py"
      - "src/ev4_transition/transitions/final_gate.py"
      - "src/ev4_transition/reports/decision_receipts.py"
      - "tests/test_cli.py"
      - "tests/test_cli_final_gate_kernel_repo.py"
      - "tests/kernel_decision_intake/**"
      - "tests/transitions/test_final_gate.py"
      - "tests/reports/test_decision_receipts.py"
      - "tests/planning/test_decision_escape_routes_schema.py"
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  kroad-011:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Project Gate
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          path: EV4-Project-Gate
          persist-credentials: false

      - name: Checkout pinned Decision Kernel
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          repository: rezahh107/EV4-Decision-Kernel
          ref: 76a82e28543ff8f0babca11b7d7dccac96b92894
          fetch-depth: 0
          path: EV4-Decision-Kernel
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          version: "0.7.22"
          enable-cache: true

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version-file: EV4-Project-Gate/.python-version

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 20

      - name: Verify Project Gate uv lockfile
        working-directory: EV4-Project-Gate
        run: uv lock --check

      - name: Install Project Gate package
        working-directory: EV4-Project-Gate
        run: uv sync --locked --extra dev --extra ui

      - name: Install pinned Kernel toolchain
        working-directory: EV4-Decision-Kernel
        run: npm ci --ignore-scripts

      - name: Validate pinned Kernel MVK
        working-directory: EV4-Decision-Kernel
        run: npm run validate:mvk

      - name: Compute immutable Kernel semantic lock
        working-directory: EV4-Project-Gate
        env:
          PYTHONPATH: src
        run: >-
          uv run python scripts/compute-kernel-decision-intake-lock.py
          --kernel-repo "${{ github.workspace }}/EV4-Decision-Kernel"
          --output kernel-decision-intake-lock-computed.json

      - name: Verify committed semantic lock when present
        working-directory: EV4-Project-Gate
        run: |
          if test -f contracts/locks/kernel-decision-intake.v1.lock.json; then
            cmp contracts/locks/kernel-decision-intake.v1.lock.json kernel-decision-intake-lock-computed.json
          else
            echo "Committed KROAD-011 lock is not present yet; computed artifact will be retained for the authoring pass."
          fi

      - name: Run official pinned Kernel bridge smoke
        working-directory: EV4-Project-Gate
        run: |
          node - <<'NODE'
          const fs = require('fs');
          const fixture = JSON.parse(fs.readFileSync('../EV4-Decision-Kernel/kernel/fixtures/valid/l2_decision_correctness/layout_structure_auto_resolved_flexbox_pass.json', 'utf8'));
          fs.writeFileSync('kernel-bridge-input.json', JSON.stringify({
            decision_record: fixture.input.decision_record,
            resolver_input: fixture.input.resolver_input,
            audit_context: { claims: [] }
          }));
          NODE
          node scripts/kernel-decision-intake-bridge.mjs \
            --kernel-repo "${{ github.workspace }}/EV4-Decision-Kernel" \
            --input kernel-bridge-input.json > kernel-bridge-output.json
          node - <<'NODE'
          const result = JSON.parse(require('fs').readFileSync('kernel-bridge-output.json', 'utf8'));
          if (result.bridge_schema_version !== 'project-gate-kernel-l2-bridge.v1') throw new Error('bridge schema mismatch');
          if (result.execution_status !== 'completed') throw new Error('bridge execution did not complete');
          if (result.kernel_audit?.audit_status !== 'pass') throw new Error(`unexpected L2 status: ${result.kernel_audit?.audit_status}`);
          NODE

      - name: Run focused Final Gate CLI and KROAD tests
        working-directory: EV4-Project-Gate
        run: >-
          uv run pytest
          tests/test_cli.py
          tests/test_cli_final_gate_kernel_repo.py
          tests/kernel_decision_intake
          tests/transitions/test_final_gate.py
          tests/reports/test_decision_receipts.py
          tests/planning/test_decision_escape_routes_schema.py

      - name: Run complete Project Gate pytest suite
        working-directory: EV4-Project-Gate
        run: |
          set -o pipefail
          uv run pytest --tb=short 2>&1 | tee kroad-011-pytest.log

      - name: Verify capability truth
        working-directory: EV4-Project-Gate
        run: uv run python scripts/check-capability-truth.py

      - name: Verify workflow permissions
        working-directory: EV4-Project-Gate
        run: uv run python scripts/check-workflow-permissions.py

      - name: Verify GitHub Action pins
        working-directory: EV4-Project-Gate
        run: uv run python scripts/check-github-action-pinning.py

      - name: Verify runner boundary
        working-directory: EV4-Project-Gate
        run: uv run python scripts/check-runner-boundary.py

      - name: Run Node status
        working-directory: EV4-Project-Gate
        run: npm run status

      - name: Run Node validation
        working-directory: EV4-Project-Gate
        run: npm run validate

      - name: Upload KROAD-011 validation artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: kroad-011-validation-artifacts
          path: |
            EV4-Project-Gate/kernel-decision-intake-lock-computed.json
            EV4-Project-Gate/kernel-bridge-output.json
            EV4-Project-Gate/kroad-011-pytest.log
          if-no-files-found: error

      - name: Record exact tested head
        run: echo "KROAD-011 validated source head ${{ github.sha }} against Kernel 76a82e28543ff8f0babca11b7d7dccac96b92894" >> "$GITHUB_STEP_SUMMARY"
