name: UI Runtime Smoke

on:
  pull_request:
  workflow_dispatch:
    inputs:
      expected_head_sha:
        description: Exact commit SHA that this dispatched run should validate.
        required: false
        type: string

permissions:
  contents: read

jobs:
  ui-runtime-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Verify dispatched exact head
        if: github.event_name == 'workflow_dispatch' && inputs.expected_head_sha != ''
        env:
          EXPECTED_HEAD_SHA: ${{ inputs.expected_head_sha }}
          TESTED_SHA: ${{ github.sha }}
        run: test "$TESTED_SHA" = "$EXPECTED_HEAD_SHA"

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          version: "0.7.22"
          enable-cache: true

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version-file: .python-version

      - name: Verify uv lockfile
        run: uv lock --check

      - name: Install package with UI extra
        run: uv sync --locked --extra dev --extra ui

      - name: Smoke-build Gradio demo without launch
        run: |
          uv run python - <<'PY'
          from ev4_transition.ui.app import build_demo

          demo = build_demo()
          assert demo is not None
          assert hasattr(demo, "launch")
          print(type(demo).__name__)
          PY

      - name: Record smoke scope
        run: |
          {
            echo "UI runtime smoke validated source head ${{ github.sha }}"
            echo "Constructed build_demo() without launch()"
            echo "This smoke does not validate browser visual behavior, accessibility, production readiness, export readiness, frontend correctness, or real Elementor execution."
          } >> "$GITHUB_STEP_SUMMARY"
