name: UI Runtime Smoke

on:
  pull_request:
  workflow_dispatch:
    inputs:
      expected_head_sha:
        description: Exact commit SHA that this dispatched run should validate.
        required: false
        type: string

permissions:
  contents: read

jobs:
  ui-runtime-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout exact source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          persist-credentials: false

      - name: Verify exact tested head and initialize evidence directory
        env:
          EXPECTED_HEAD_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || inputs.expected_head_sha || github.sha }}
        run: |
          actual_head="$(git rev-parse HEAD)"
          test "$actual_head" = "$EXPECTED_HEAD_SHA"
          evidence_dir="$RUNNER_TEMP/ev4-ui-runtime-evidence"
          mkdir -p "$evidence_dir"
          printf '%s\n' "$actual_head" > "$evidence_dir/tested-head-sha.txt"
          printf 'EVIDENCE_DIR=%s\n' "$evidence_dir" >> "$GITHUB_ENV"

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          version: "0.7.22"
          enable-cache: true

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version-file: .python-version

      - name: Verify lock and install package
        run: |
          uv lock --check
          uv sync --locked --extra dev --extra ui

      - name: Focused architectural and adversarial tests
        shell: bash
        run: |
          set -o pipefail
          uv run pytest \
            tests/ui \
            tests/service \
            tests/producer_integration \
            tests/boundary/test_runner_boundary_static.py \
            tests/boundary/test_import_purity.py \
            tests/boundary/test_native_ui_runners.py \
            tests/boundary/test_evidence_packaging.py \
            tests/boundary/test_ui_publication_authority.py \
            tests/packaging/test_runner_packaging.py \
            tests/test_cli_final_gate_kernel_repo.py \
            -vv --junitxml="$EVIDENCE_DIR/focused-junit.xml" \
            2>&1 | tee "$EVIDENCE_DIR/focused-tests.log"

      - name: Full repository tests
        shell: bash
        run: |
          set -o pipefail
          uv run pytest -vv --junitxml="$EVIDENCE_DIR/full-junit.xml" \
            2>&1 | tee "$EVIDENCE_DIR/full-tests.log"

      - name: Build Gradio demo without launch
        run: |
          uv run python -c "from ev4_transition.ui.app import build_demo; demo = build_demo(); assert demo is not None; print('UI_BUILD_OK')" \
            | tee "$EVIDENCE_DIR/ui-build.log"

      - name: Build installable wheel
        run: |
          mkdir -p "$EVIDENCE_DIR/dist"
          uv build --wheel --out-dir "$EVIDENCE_DIR/dist" --python "$(command -v python)" --no-python-downloads
          ls -l "$EVIDENCE_DIR/dist" | tee "$EVIDENCE_DIR/wheel-build.log"

      - name: Clean-install packaged UI and runner modules
        shell: bash
        run: |
          clean_venv="$RUNNER_TEMP/ev4-clean-install"
          uv venv "$clean_venv"
          wheel_path="$(find "$EVIDENCE_DIR/dist" -maxdepth 1 -name '*.whl' -print -quit)"
          test -n "$wheel_path"
          uv pip install --python "$clean_venv/bin/python" "$wheel_path" "gradio>=4,<6"
          (
            cd "$RUNNER_TEMP"
            "$clean_venv/bin/python" -c "from ev4_transition.runners.native_dialog import select_directory; from ev4_transition.runners.open_output_folder import open_directory; from ev4_transition.ui.app import build_demo; demo = build_demo(); assert demo is not None; assert select_directory is not None; assert open_directory is not None; print('CLEAN_INSTALL_IMPORT_OK')"
          ) | tee "$EVIDENCE_DIR/clean-install.log"

      - name: Package exact-head source evidence outside checkout
        if: always()
        env:
          TESTED_HEAD_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || inputs.expected_head_sha || github.sha }}
        run: |
          mkdir -p "$EVIDENCE_DIR/source"
          uv run python scripts/package-ci-evidence.py \
            --source "$GITHUB_WORKSPACE" \
            --archive "$EVIDENCE_DIR/source/pr-head-source.tar" \
            --manifest "$EVIDENCE_DIR/source/source-evidence-manifest.json" \
            --tested-head-sha "$TESTED_HEAD_SHA" \
            | tee "$EVIDENCE_DIR/source/source-packaging.log"
          test -s "$EVIDENCE_DIR/source/pr-head-source.tar"
          test -s "$EVIDENCE_DIR/source/source-evidence-manifest.json"

      - name: Upload exact-head UI and repair evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: ui-runtime-repair-evidence-${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          path: ${{ runner.temp }}/ev4-ui-runtime-evidence
          if-no-files-found: error
          retention-days: 14

      - name: Record validation scope
        if: success()
        run: |
          {
            echo "UI runtime and repair invariants validated source head $(git rev-parse HEAD)"
            echo "Focused and full pytest suites passed."
            echo "The wheel was built, clean-installed, and packaged UI/runner imports succeeded."
            echo "The Gradio demo was constructed without launch()."
            echo "Native Windows dialog behavior and the original non-synthetic owner export still require owner acceptance."
          } >> "$GITHUB_STEP_SUMMARY"
