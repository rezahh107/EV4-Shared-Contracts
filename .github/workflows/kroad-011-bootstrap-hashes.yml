name: KROAD-011 Bootstrap Hashes

on:
  pull_request:
  push:
    branches:
      - feature/kroad-011-project-gate-intake

permissions:
  contents: read

jobs:
  hashes:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Kernel pin
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          repository: rezahh107/EV4-Decision-Kernel
          ref: 76a82e28543ff8f0babca11b7d7dccac96b92894
          persist-credentials: false

      - name: Compute semantic dependency hashes
        shell: bash
        run: |
          set -euo pipefail
          sha256sum \
            kernel/schemas/decision-record.v2.schema.json \
            kernel/decision-governance/p0-decision-matrices.v0.json \
            kernel/decision-governance/resolver-rule-registry.v0.json \
            kernel/decision-governance/resolver-rules/layout-structure.v0.json \
            kernel/resolver-mvp/resolve-high-risk-p0.mjs \
            kernel/validator/validate-l2-decision-correctness.mjs \
            | tee kroad-011-semantic-hashes.txt

      - name: Upload semantic dependency hashes
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: kroad-011-semantic-hashes
          path: kroad-011-semantic-hashes.txt
          if-no-files-found: error
