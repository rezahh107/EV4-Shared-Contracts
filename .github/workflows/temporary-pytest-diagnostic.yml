name: Temporary Pytest Diagnostic

on:
  pull_request:

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout exact PR head
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 1
          persist-credentials: false
          show-progress: false

      - name: Install uv quietly
        run: python -m pip install --disable-pip-version-check --quiet uv==0.7.22

      - name: Run first failing test with concise output
        run: |
          uv lock --check --quiet
          uv sync --locked --extra dev --extra ui --quiet
          uv run pytest -x -q --tb=short
