name: Temporary Pytest Diagnostic

on:
  pull_request:

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Fetch exact PR head quietly
        env:
          TESTED_HEAD: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          git init --quiet .
          git remote add origin "https://github.com/${GITHUB_REPOSITORY}.git"
          git fetch --quiet --depth=1 origin "$TESTED_HEAD"
          git checkout --quiet --detach FETCH_HEAD
          test "$(git rev-parse HEAD)" = "$TESTED_HEAD"

      - name: Install uv quietly
        run: python -m pip install --disable-pip-version-check --quiet uv==0.7.22

      - name: Run first failing test with concise output
        run: |
          uv lock --check --quiet
          uv sync --locked --extra dev --extra ui --quiet
          uv run pytest -x -q --tb=short
