name: Publish Prompt 05 Workflows

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  publish:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repair head
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Materialize final workflow files
        run: |
          python - <<'PY'
          import importlib.util
          from pathlib import Path

          path = Path('scripts/bootstrap-prompt05-repair.py')
          spec = importlib.util.spec_from_file_location('prompt05_bootstrap', path)
          module = importlib.util.module_from_spec(spec)
          assert spec.loader is not None
          spec.loader.exec_module(module)
          module.write_prompt_workflow()
          module.patch_primary_workflow()
          PY

      - name: Remove temporary repair surfaces
        run: rm .github/workflows/finalize-prompt05-repair.yml scripts/bootstrap-prompt05-repair.py

      - name: Publish final workflows
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/workflows scripts/bootstrap-prompt05-repair.py
          git commit -m "Publish Prompt-05 exact-head CI gates"
          git push origin HEAD:fix/prompt-05-foundation-reconciliation
