name: Finalize Prompt 05 Repair

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  finalize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repair head
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Checkout pinned Responsive repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          repository: rezahh107/EV4-Responsive-Architect
          ref: df74c7ba2ffbed1a4136b5ea6be6ce30db4e161a
          path: .owner/EV4-Responsive-Architect
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.11'

      - name: Install package
        run: python -m pip install -e '.[dev]'

      - name: Materialize desired final workflows
        run: |
          python - <<'PY'
          import importlib.util
          from pathlib import Path

          path = Path('scripts/bootstrap-prompt05-repair.py')
          spec = importlib.util.spec_from_file_location('prompt05_bootstrap', path)
          module = importlib.util.module_from_spec(spec)
          assert spec.loader is not None
          spec.loader.exec_module(module)
          module.write_prompt_workflow()
          module.patch_primary_workflow()
          PY
          mkdir -p "$RUNNER_TEMP/prompt05-workflows"
          cp .github/workflows/prompt-05.yml "$RUNNER_TEMP/prompt05-workflows/prompt-05.yml"
          cp .github/workflows/validate.yml "$RUNNER_TEMP/prompt05-workflows/validate.yml"
          git checkout HEAD -- .github/workflows

      - name: Finalize immutable Project Gate pin and final lock
        run: |
          python scripts/bootstrap-prompt05-repair.py --finalize-commit "${{ github.event.pull_request.head.sha }}"
          python scripts/compute-final-gate-lock.py \
            --project-gate-repo . \
            --responsive-repo .owner/EV4-Responsive-Architect \
            --output contracts/locks/final-gate.v1.lock.json

      - name: Run Builder to Responsive tests after finalize
        run: pytest -vv --tb=short tests/transitions/test_builder_to_responsive.py

      - name: Run Final Gate tests after finalize
        run: pytest -vv --tb=short tests/transitions/test_final_gate.py

      - name: Run capability and CLI tests after finalize
        run: pytest -vv --tb=short tests/test_cli.py

      - name: Commit finalized Prompt-05 lock chain
        run: |
          rm -rf .owner
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/ev4_transition/transitions/final_gate.py contracts/locks/final-gate.v1.lock.json
          git commit -m "Finalize Prompt-05 immutable lock chain [skip ci]"
          git push origin HEAD:fix/prompt-05-foundation-reconciliation

      - name: Upload desired workflow patch
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: prompt05-final-workflows
          path: ${{ runner.temp }}/prompt05-workflows
          retention-days: 2
