name: Temporary Pytest Diagnosis

on:
  pull_request:
    paths:
      - ".github/workflows/diagnose-pytest.yml"
      - "src/**"
      - "tests/**"
      - "scripts/**"
      - "pyproject.toml"
      - "uv.lock"

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout exact PR Head
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 1
          persist-credentials: false
          show-progress: false

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          version: "0.7.22"
          enable-cache: false

      - name: Install locked project
        run: uv sync --locked --extra dev --extra ui --quiet

      - name: Capture full pytest result
        shell: bash
        run: |
          set +e
          uv run pytest -vv > pytest-diagnostic.log 2>&1
          status=$?
          set -e
          printf '%s\n' "$status" > pytest-diagnostic.exit-code
          exit "$status"

      - name: Upload temporary diagnostic
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: temporary-pytest-diagnostic
          path: |
            pytest-diagnostic.log
            pytest-diagnostic.exit-code
          if-no-files-found: error
