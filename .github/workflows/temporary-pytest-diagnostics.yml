name: Temporary Pytest Diagnostics

on:
  pull_request:

permissions:
  contents: read

jobs:
  pytest-diagnostics:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout exact Project Gate source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
          path: EV4-Project-Gate
          persist-credentials: false
          show-progress: false

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          version: "0.7.22"
          enable-cache: true

      - name: Install locked Project Gate package
        working-directory: EV4-Project-Gate
        run: uv sync --locked --extra dev --extra ui --quiet

      - name: Checkout Architect owner repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          repository: rezahh107/EV4-Architect-Repo
          ref: be9bdea9ae246b1587043f2582c1a950ea2a6ec5
          path: EV4-Architect-Repo
          persist-credentials: false
          show-progress: false

      - name: Checkout CE owner repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          repository: rezahh107/EV4-Constructability-Engineer-Repo
          ref: 6650c31304e5a0472b276c36018c1df8f42ac983
          path: EV4-Constructability-Engineer-Repo
          persist-credentials: false
          show-progress: false

      - name: Print focused A2C cross-repo pytest failures
        working-directory: EV4-Project-Gate
        shell: bash
        env:
          EV4_ARCHITECT_REPO: ${{ github.workspace }}/EV4-Architect-Repo
          EV4_CE_REPO: ${{ github.workspace }}/EV4-Constructability-Engineer-Repo
        run: |
          set +e
          uv run pytest -q --tb=short --maxfail=20 \
            tests/test_architect_to_ce_transition.py \
            tests/producer_integration/test_pg_a2c_io.py \
            tests/producer_integration/test_pg_a2c_dispatch.py \
            > "$RUNNER_TEMP/a2c-pytest.log" 2>&1
          status=$?
          set -e
          echo "PYTEST_STATUS=$status"
          echo "PYTEST_FAILURE_TAIL_START"
          tail -n 220 "$RUNNER_TEMP/a2c-pytest.log"
          echo "PYTEST_FAILURE_TAIL_END"
          exit "$status"
