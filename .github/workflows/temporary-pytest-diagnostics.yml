name: Temporary Pytest Diagnostics

on:
  pull_request:

permissions:
  contents: read

jobs:
  pytest-diagnostics:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Print focused Final Gate diagnostics
        shell: bash
        env:
          TESTED_HEAD: ${{ github.event.pull_request.head.sha }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          git init --quiet .
          git remote add origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git fetch --quiet --depth=1 origin "$TESTED_HEAD"
          git checkout --quiet --detach FETCH_HEAD
          python -m pip install --quiet uv==0.7.22
          uv sync --locked --extra dev --extra ui --quiet
          uv run python - <<'PY'
          import json
          import tempfile
          from pathlib import Path
          from tests.transitions.test_final_gate import _run

          result, _value, calls, _responsive, _source, _final_lock, _kernel_lock, _config = _run(Path(tempfile.mkdtemp()))
          kernel_result = result.get('kernel_decision_intake_result')
          print('FINAL_STATUS=' + str(result.get('status')))
          print('FINAL_KERNEL_CALLS=' + str(len(calls)))
          print('FINAL_KERNEL_STATUS=' + str(kernel_result.get('status') if isinstance(kernel_result, dict) else None))
          print('FINAL_KERNEL_DIAGNOSTICS=' + json.dumps(kernel_result.get('diagnostics', []) if isinstance(kernel_result, dict) else [], sort_keys=True))
          PY
