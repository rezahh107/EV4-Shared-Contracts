name: Temporary Pytest Diagnostics

on:
  pull_request:

permissions:
  contents: read

jobs:
  pytest-diagnostics:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Print concise pytest failures
        shell: bash
        env:
          TESTED_HEAD: ${{ github.event.pull_request.head.sha }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          git init --quiet .
          git remote add origin "https://github.com/${GITHUB_REPOSITORY}.git"
          git -c http.https://github.com/.extraheader="AUTHORIZATION: bearer ${GH_TOKEN}" fetch --quiet --depth=1 origin "$TESTED_HEAD"
          git checkout --quiet --detach FETCH_HEAD
          python -m pip install --quiet uv==0.7.22
          uv sync --locked --extra dev --extra ui --quiet
          set +e
          uv run pytest -q --tb=line --maxfail=25 > /tmp/pytest.log 2>&1
          status=$?
          set -e
          if [[ "$status" -ne 0 ]]; then
            python - <<'PY'
          from pathlib import Path
          lines = Path('/tmp/pytest.log').read_text(errors='replace').splitlines()
          selected = [line for line in lines if ('FAILED ' in line or 'ERROR ' in line or line.startswith('E   ') or 'short test summary info' in line)]
          print('PYTEST_FAILURES=' + ' || '.join(selected[-80:]))
          PY
            exit "$status"
          fi
          echo PYTEST_FAILURES=NONE
