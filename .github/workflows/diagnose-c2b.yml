name: Temporary Boundary Diagnosis

on:
  pull_request:
    paths:
      - ".github/workflows/diagnose-c2b.yml"

permissions:
  contents: read

jobs:
  diagnose-final-kernel:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout exact Project Gate Head
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          path: EV4-Project-Gate
          fetch-depth: 1
          persist-credentials: false
          show-progress: false

      - name: Checkout pinned Responsive
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          repository: rezahh107/EV4-Responsive-Architect
          ref: df74c7ba2ffbed1a4136b5ea6be6ce30db4e161a
          path: EV4-Responsive-Architect
          persist-credentials: false
          show-progress: false

      - name: Checkout pinned Decision Kernel
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          repository: rezahh107/EV4-Decision-Kernel
          ref: 76a82e28543ff8f0babca11b7d7dccac96b92894
          path: EV4-Decision-Kernel
          fetch-depth: 1
          persist-credentials: false
          show-progress: false

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          version: "0.7.22"
          enable-cache: false

      - name: Setup Node for Kernel diagnosis
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 20

      - name: Install Project Gate
        working-directory: EV4-Project-Gate
        run: uv sync --locked --extra dev --extra ui --quiet

      - name: Capture Final Gate and Kernel command results
        working-directory: EV4-Project-Gate
        shell: bash
        env:
          EV4_RESPONSIVE_REPO: ${{ github.workspace }}/EV4-Responsive-Architect
          EV4_KERNEL_REPO: ${{ github.workspace }}/EV4-Decision-Kernel
        run: |
          set +e
          : > boundary-diagnostic.log
          overall=0
          run_check() {
            name="$1"
            shift
            echo "=== $name ===" >> boundary-diagnostic.log
            "$@" >> boundary-diagnostic.log 2>&1
            status=$?
            echo "exit_code=$status" >> boundary-diagnostic.log
            if [[ "$status" -ne 0 ]]; then overall=1; fi
          }

          run_check final_tests uv run pytest -q tests/transitions/test_final_gate.py tests/reports/test_decision_receipts.py
          run_check final_compute_lock uv run python scripts/compute-final-gate-lock.py --project-gate-repo . --responsive-repo "$EV4_RESPONSIVE_REPO" --output /tmp/final-gate-lock.json
          run_check final_byte_compare cmp /tmp/final-gate-lock.json contracts/locks/final-gate.v1.lock.json
          run_check final_semantic_compare uv run python -c 'from ev4_transition.canonical_json import load_json_file; assert load_json_file("/tmp/final-gate-lock.json") == load_json_file("contracts/locks/final-gate.v1.lock.json")'

          run_check kernel_install bash -lc 'cd "$EV4_KERNEL_REPO" && npm ci --ignore-scripts'
          run_check kernel_mvk bash -lc 'cd "$EV4_KERNEL_REPO" && npm run validate:mvk'
          run_check kernel_compute_lock uv run python scripts/compute-kernel-decision-intake-lock.py --kernel-repo "$EV4_KERNEL_REPO" --output /tmp/kernel-lock.json
          run_check kernel_byte_compare cmp /tmp/kernel-lock.json contracts/locks/kernel-decision-intake.v1.lock.json
          run_check kernel_semantic_compare uv run python -c 'from ev4_transition.canonical_json import load_json_file; assert load_json_file("/tmp/kernel-lock.json") == load_json_file("contracts/locks/kernel-decision-intake.v1.lock.json")'

          node - <<'NODE'
          const fs = require('fs');
          const fixture = JSON.parse(fs.readFileSync(process.env.EV4_KERNEL_REPO + '/kernel/fixtures/valid/l2_decision_correctness/layout_structure_auto_resolved_flexbox_pass.json', 'utf8'));
          fs.writeFileSync('/tmp/kernel-bridge-input.json', JSON.stringify({
            decision_record: fixture.input.decision_record,
            resolver_input: fixture.input.resolver_input,
            audit_context: { claims: [] }
          }));
          NODE
          run_check kernel_bridge node scripts/kernel-decision-intake-bridge.mjs --kernel-repo "$EV4_KERNEL_REPO" --input /tmp/kernel-bridge-input.json
          run_check kernel_tests uv run pytest -q tests/kernel_decision_intake tests/test_cli_final_gate_kernel_repo.py tests/planning/test_decision_escape_routes_schema.py
          exit "$overall"

      - name: Upload temporary boundary diagnostic
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: temporary-boundary-diagnostic
          path: EV4-Project-Gate/boundary-diagnostic.log
          if-no-files-found: error
