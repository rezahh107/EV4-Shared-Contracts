name: Skeleton Health

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      expected_head_sha:
        description: Optional exact commit SHA this run must validate.
        required: false
        type: string
      full_validation:
        description: Execute every external boundary.
        required: false
        default: true
        type: boolean

permissions:
  contents: read

jobs:
  skeleton:
    name: skeleton
    runs-on: ubuntu-latest
    outputs:
      tested_head: ${{ steps.scope.outputs.tested_head }}
      run_all: ${{ steps.scope.outputs.run_all }}
      boundaries_json: ${{ steps.scope.outputs.boundaries_json }}
      boundary_count: ${{ steps.scope.outputs.boundary_count }}
    steps:
      - name: Checkout exact Project Gate source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0
          persist-credentials: false
          show-progress: false

      - name: Assert exact tested head and classify scope
        id: scope
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          EXPECTED_HEAD_SHA: ${{ inputs.expected_head_sha }}
          FULL_VALIDATION: ${{ inputs.full_validation }}
        run: |
          set -euo pipefail
          tested_head="$(git rev-parse HEAD)"
          expected_head="${PR_HEAD_SHA:-${GITHUB_SHA}}"
          test "$tested_head" = "$expected_head"
          if [[ -n "${EXPECTED_HEAD_SHA:-}" ]]; then
            test "$tested_head" = "$EXPECTED_HEAD_SHA"
          fi
          echo "tested_head=$tested_head" >> "$GITHUB_OUTPUT"

          if [[ "$EVENT_NAME" == "pull_request" ]]; then
            git diff --name-only "$PR_BASE_SHA" "$PR_HEAD_SHA" > "$RUNNER_TEMP/changed-paths.txt"
            classifier=(python scripts/classify-validation-scope.py --paths-file "$RUNNER_TEMP/changed-paths.txt")
          else
            classifier=(python scripts/classify-validation-scope.py --force-all)
          fi
          if [[ "$EVENT_NAME" == "workflow_dispatch" && "${FULL_VALIDATION:-true}" == "true" ]]; then
            classifier=(python scripts/classify-validation-scope.py --force-all)
          fi
          "${classifier[@]}" --github-output "$GITHUB_OUTPUT" | tee "$RUNNER_TEMP/validation-scope.json"

      - name: Summarize validation scope
        run: |
          {
            echo "## Validation scope"
            echo "- tested head: \`${{ steps.scope.outputs.tested_head }}\`"
            echo "- run all: \`${{ steps.scope.outputs.run_all }}\`"
            echo "- boundaries: \`${{ steps.scope.outputs.boundaries_json }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

  python-core:
    name: python-core
    needs: skeleton
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Fetch exact Project Gate source quietly
        shell: bash
        env:
          TESTED_HEAD: ${{ needs.skeleton.outputs.tested_head }}
        run: |
          set -euo pipefail
          git init --quiet .
          git remote add origin "https://github.com/${GITHUB_REPOSITORY}.git"
          git fetch --quiet --depth=1 origin "$TESTED_HEAD"
          git checkout --quiet --detach FETCH_HEAD
          test "$(git rev-parse HEAD)" = "$TESTED_HEAD"

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          version: "0.7.22"
          enable-cache: true

      - name: Install locked project
        run: |
          uv lock --check --quiet
          uv sync --locked --extra dev --extra ui --quiet

      - name: Compile Python sources
        run: uv run python -m compileall -q src tests

      - name: Run full internal quality suite once
        shell: bash
        run: |
          set +e
          uv run pytest -vv > "$RUNNER_TEMP/pytest.log" 2>&1
          pytest_status=$?
          set -e
          if [[ "$pytest_status" -ne 0 ]]; then
            echo "Pytest failed; newest diagnostic lines follow first:"
            tail -n 300 "$RUNNER_TEMP/pytest.log" | tac
            exit "$pytest_status"
          fi
          tail -n 20 "$RUNNER_TEMP/pytest.log"

      - name: Run core CLI smokes
        shell: bash
        run: |
          uv run ev4-transition validate fixtures/valid/architect-stage-bundle.v1.json
          set +e
          uv run ev4-transition validate fixtures/invalid/array-input.v1.json
          invalid_status=$?
          insufficient_output="$(uv run ev4-transition validate fixtures/insufficient-evidence/architect-stage-bundle.v1.json --format persian)"
          insufficient_status=$?
          set -e
          test "$invalid_status" -eq 1
          test "$insufficient_status" -eq 2
          printf '%s' "$insufficient_output" | grep 'شواهد کافی نیست'

      - name: Verify single capability authority
        run: uv run python scripts/check-capability-truth.py

      - name: Build wheel once
        run: |
          mkdir -p "$RUNNER_TEMP/dist"
          uv build --wheel --out-dir "$RUNNER_TEMP/dist" --python "$(command -v python)" --no-python-downloads

      - name: Clean-install package and construct UI once
        shell: bash
        run: |
          clean_venv="$RUNNER_TEMP/ev4-clean-install"
          uv venv "$clean_venv"
          wheel_path="$(find "$RUNNER_TEMP/dist" -maxdepth 1 -name '*.whl' -print -quit)"
          test -n "$wheel_path"
          uv pip install --python "$clean_venv/bin/python" "$wheel_path" "gradio>=4,<6" --quiet
          (
            cd "$RUNNER_TEMP"
            "$clean_venv/bin/python" - <<'PY'
          from ev4_transition.cli import main
          from ev4_transition.runners.native_dialog import select_directory
          from ev4_transition.runners.open_output_folder import open_directory
          from ev4_transition.ui.app import build_demo

          demo = build_demo()
          assert demo is not None
          assert main is not None
          assert select_directory is not None
          assert open_directory is not None
          print("CLEAN_INSTALL_RUNTIME_OK")
          PY
          )

      - name: Record core result
        run: |
          {
            echo "## Core quality"
            echo "- tested head: \`${{ needs.skeleton.outputs.tested_head }}\`"
            echo "- full pytest: once"
            echo "- wheel build: once"
            echo "- clean install and UI construction: once"
          } >> "$GITHUB_STEP_SUMMARY"

  affected-boundaries:
    name: boundary-${{ matrix.boundary }}
    needs:
      - skeleton
      - python-core
    if: needs.skeleton.outputs.boundary_count != '0'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        boundary: ${{ fromJSON(needs.skeleton.outputs.boundaries_json) }}
    steps:
      - name: Checkout exact Project Gate source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ needs.skeleton.outputs.tested_head }}
          fetch-depth: 0
          path: EV4-Project-Gate
          persist-credentials: false
          show-progress: false

      - name: Assert exact tested head
        run: test "$(git -C EV4-Project-Gate rev-parse HEAD)" = "${{ needs.skeleton.outputs.tested_head }}"

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          version: "0.7.22"
          enable-cache: true

      - name: Install locked Project Gate package
        working-directory: EV4-Project-Gate
        run: uv sync --locked --extra dev --extra ui --quiet

      - name: Checkout Architect owner repository
        if: matrix.boundary == 'architect_to_ce'
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          repository: rezahh107/EV4-Architect-Repo
          ref: be9bdea9ae246b1587043f2582c1a950ea2a6ec5
          path: EV4-Architect-Repo
          persist-credentials: false
          show-progress: false

      - name: Checkout CE owner repository for Architect boundary
        if: matrix.boundary == 'architect_to_ce'
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          repository: rezahh107/EV4-Constructability-Engineer-Repo
          ref: 6650c31304e5a0472b276c36018c1df8f42ac983
          path: EV4-Constructability-Engineer-Repo
          persist-credentials: false
          show-progress: false

      - name: Verify Architect to CE boundary
        if: matrix.boundary == 'architect_to_ce'
        working-directory: EV4-Project-Gate
        env:
          EV4_ARCHITECT_REPO: ${{ github.workspace }}/EV4-Architect-Repo
          EV4_CE_REPO: ${{ github.workspace }}/EV4-Constructability-Engineer-Repo
        run: |
          uv run pytest -q tests/test_architect_to_ce_transition.py tests/producer_integration/test_pg_a2c_io.py tests/producer_integration/test_pg_a2c_dispatch.py
          uv run python scripts/verify-architect-to-ce-lock.py --architect-repo "$EV4_ARCHITECT_REPO" --ce-repo "$EV4_CE_REPO"
          uv run python scripts/transition-smoke.py --architect-repo "$EV4_ARCHITECT_REPO" --ce-repo "$EV4_CE_REPO"
          (cd "$EV4_ARCHITECT_REPO" && "${{ github.workspace }}/EV4-Project-Gate/.venv/bin/python" scripts/check-architect-stage-payload.py)
          (cd "$EV4_CE_REPO" && "${{ github.workspace }}/EV4-Project-Gate/.venv/bin/python" scripts/validate-ce-architect-stage-intake.py)

      - name: Checkout CE owner repository for Builder boundary
        if: matrix.boundary == 'ce_to_builder'
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          repository: rezahh107/EV4-Constructability-Engineer-Repo
          ref: 6650c31304e5a0472b276c36018c1df8f42ac983
          path: EV4-Constructability-Engineer-Repo
          persist-credentials: false
          show-progress: false

      - name: Checkout Builder owner repository for CE boundary
        if: matrix.boundary == 'ce_to_builder'
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          repository: rezahh107/EV4-Builder-Assistant-Repo
          ref: b599c000118dcbe77572d6f387da5da0f46d1f91
          path: EV4-Builder-Assistant-Repo
          persist-credentials: false
          show-progress: false

      - name: Verify CE to Builder boundary
        if: matrix.boundary == 'ce_to_builder'
        working-directory: EV4-Project-Gate
        env:
          EV4_CE_REPO: ${{ github.workspace }}/EV4-Constructability-Engineer-Repo
          EV4_BUILDER_REPO: ${{ github.workspace }}/EV4-Builder-Assistant-Repo
        run: |
          uv run pytest -q tests/transitions/test_ce_to_builder.py tests/producer_integration/test_pg_c2b_dispatch.py
          uv run python scripts/compute-ce-to-builder-lock.py --ce-repo "$EV4_CE_REPO" --builder-repo "$EV4_BUILDER_REPO" --output /tmp/c2b-lock.json
          cmp /tmp/c2b-lock.json contracts/locks/ce-to-builder-transition.v1.lock.json
          uv run python scripts/verify-ce-to-builder-lock.py --ce-repo "$EV4_CE_REPO" --builder-repo "$EV4_BUILDER_REPO"
          uv run python scripts/ce-to-builder-smoke.py --ce-repo "$EV4_CE_REPO" --builder-repo "$EV4_BUILDER_REPO" --fixture "$EV4_CE_REPO/tests/role-alignment/valid/executable_visual_reference_package.json"

      - name: Checkout Builder owner repository for Responsive boundary
        if: matrix.boundary == 'builder_to_responsive'
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          repository: rezahh107/EV4-Builder-Assistant-Repo
          ref: 69a2c61edf6d06b4418ad770fcefbfdffcf275d6
          path: EV4-Builder-Assistant-Repo
          persist-credentials: false
          show-progress: false

      - name: Checkout Responsive owner repository
        if: matrix.boundary == 'builder_to_responsive' || matrix.boundary == 'final_gate'
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          repository: rezahh107/EV4-Responsive-Architect
          ref: df74c7ba2ffbed1a4136b5ea6be6ce30db4e161a
          path: EV4-Responsive-Architect
          persist-credentials: false
          show-progress: false

      - name: Verify Builder to Responsive boundary
        if: matrix.boundary == 'builder_to_responsive'
        working-directory: EV4-Project-Gate
        env:
          EV4_BUILDER_REPO: ${{ github.workspace }}/EV4-Builder-Assistant-Repo
          EV4_RESPONSIVE_REPO: ${{ github.workspace }}/EV4-Responsive-Architect
        run: |
          uv run pytest -q tests/transitions/test_builder_to_responsive.py
          uv run python scripts/compute-builder-to-responsive-lock.py --builder-repo "$EV4_BUILDER_REPO" --responsive-repo "$EV4_RESPONSIVE_REPO" --output /tmp/b2r-lock.json
          cmp /tmp/b2r-lock.json contracts/locks/builder-to-responsive-transition.v1.lock.json
          (cd "$EV4_RESPONSIVE_REPO" && "${{ github.workspace }}/EV4-Project-Gate/.venv/bin/python" validation/e2e/run_builder_responsive_input_boundary_check.py)
          (cd "$EV4_RESPONSIVE_REPO" && "${{ github.workspace }}/EV4-Project-Gate/.venv/bin/python" validation/e2e/run_responsive_tree_architecture_refactor_check.py)

      - name: Verify Final Gate boundary
        if: matrix.boundary == 'final_gate'
        working-directory: EV4-Project-Gate
        env:
          EV4_RESPONSIVE_REPO: ${{ github.workspace }}/EV4-Responsive-Architect
        run: |
          uv run pytest -q tests/transitions/test_final_gate.py tests/reports/test_decision_receipts.py
          uv run python scripts/compute-final-gate-lock.py --project-gate-repo . --responsive-repo "$EV4_RESPONSIVE_REPO" --output /tmp/final-gate-lock.json
          cmp /tmp/final-gate-lock.json contracts/locks/final-gate.v1.lock.json

      - name: Checkout pinned Decision Kernel
        if: matrix.boundary == 'kernel_intake'
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          repository: rezahh107/EV4-Decision-Kernel
          ref: 76a82e28543ff8f0babca11b7d7dccac96b92894
          fetch-depth: 0
          path: EV4-Decision-Kernel
          persist-credentials: false
          show-progress: false

      - name: Setup Node for Kernel boundary only
        if: matrix.boundary == 'kernel_intake'
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 20

      - name: Verify Kernel intake boundary
        if: matrix.boundary == 'kernel_intake'
        working-directory: EV4-Project-Gate
        env:
          EV4_KERNEL_REPO: ${{ github.workspace }}/EV4-Decision-Kernel
        run: |
          (cd "$EV4_KERNEL_REPO" && npm ci --ignore-scripts && npm run validate:mvk)
          uv run python scripts/compute-kernel-decision-intake-lock.py --kernel-repo "$EV4_KERNEL_REPO" --output /tmp/kernel-lock.json
          cmp /tmp/kernel-lock.json contracts/locks/kernel-decision-intake.v1.lock.json
          node - <<'NODE'
          const fs = require('fs');
          const fixture = JSON.parse(fs.readFileSync(process.env.EV4_KERNEL_REPO + '/kernel/fixtures/valid/l2_decision_correctness/layout_structure_auto_resolved_flexbox_pass.json', 'utf8'));
          fs.writeFileSync('/tmp/kernel-bridge-input.json', JSON.stringify({
            decision_record: fixture.input.decision_record,
            resolver_input: fixture.input.resolver_input,
            audit_context: { claims: [] }
          }));
          NODE
          node scripts/kernel-decision-intake-bridge.mjs --kernel-repo "$EV4_KERNEL_REPO" --input /tmp/kernel-bridge-input.json > /tmp/kernel-bridge-output.json
          uv run pytest -q tests/kernel_decision_intake tests/test_cli_final_gate_kernel_repo.py tests/planning/test_decision_escape_routes_schema.py

      - name: Checkout Architect producer
        if: matrix.boundary == 'producer_integration'
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          repository: rezahh107/EV4-Architect-Repo
          ref: be9bdea9ae246b1587043f2582c1a950ea2a6ec5
          path: producers/architect
          persist-credentials: false
          show-progress: false

      - name: Checkout CE producer
        if: matrix.boundary == 'producer_integration'
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          repository: rezahh107/EV4-Constructability-Engineer-Repo
          ref: 6650c31304e5a0472b276c36018c1df8f42ac983
          path: producers/ce
          persist-credentials: false
          show-progress: false

      - name: Checkout Builder producer
        if: matrix.boundary == 'producer_integration'
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          repository: rezahh107/EV4-Builder-Assistant-Repo
          ref: 45459d0246f5d14486867224d26c2d2ba8a563b6
          path: producers/builder
          persist-credentials: false
          show-progress: false

      - name: Checkout Responsive producer
        if: matrix.boundary == 'producer_integration'
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          repository: rezahh107/EV4-Responsive-Architect
          ref: 28a995a603a5a383b8592d6beae7db8943f20acf
          path: producers/responsive
          persist-credentials: false
          show-progress: false

      - name: Verify producer integration boundary
        if: matrix.boundary == 'producer_integration'
        working-directory: EV4-Project-Gate
        run: |
          uv run pytest -q tests/producer_integration
          uv run python - <<'PY'
          import hashlib
          import json
          import subprocess
          from pathlib import Path
          from ev4_transition.producer_integration.registry import validate_adoption_registry

          result = validate_adoption_registry()
          assert result["status"] == "valid", result
          registry = json.load(open("contracts/producer-adoption/ev4-producer-adoption-set.v1.json", encoding="utf-8"))
          roots = {
              "architect": Path("../producers/architect"),
              "ce": Path("../producers/ce"),
              "builder": Path("../producers/builder"),
              "responsive": Path("../producers/responsive"),
          }
          for producer in registry["producers"]:
              root = roots[producer["stage"]]
              commit = producer["runtime_pin"]["merged_commit_sha"]
              validators = [a["path"] for a in producer.get("artifacts", []) if a.get("role") == "validator"]
              assert validators, f"{producer['stage']}: no validator artifact recorded"
              for validator in validators:
                  assert (root / validator).is_file(), f"{producer['stage']}: missing {validator}"
              for record in producer["hash_verification"]["records"]:
                  assert record["commit_sha"] == commit
                  data = subprocess.check_output(["git", "-C", str(root), "show", f"{commit}:{record['path']}"])
                  assert hashlib.sha256(data).hexdigest() == record["sha256"]
          PY

      - name: Record boundary result
        run: echo "Boundary ${{ matrix.boundary }} passed on ${{ needs.skeleton.outputs.tested_head }}" >> "$GITHUB_STEP_SUMMARY"

  quality-gate:
    name: quality-gate
    if: always()
    needs:
      - skeleton
      - python-core
      - affected-boundaries
    runs-on: ubuntu-latest
    steps:
      - name: Enforce complete result
        shell: bash
        env:
          SCOPE_RESULT: ${{ needs.skeleton.result }}
          CORE_RESULT: ${{ needs.python-core.result }}
          BOUNDARY_RESULT: ${{ needs.affected-boundaries.result }}
          BOUNDARY_COUNT: ${{ needs.skeleton.outputs.boundary_count }}
          TESTED_HEAD: ${{ needs.skeleton.outputs.tested_head }}
          BOUNDARIES: ${{ needs.skeleton.outputs.boundaries_json }}
        run: |
          set -euo pipefail
          test "$SCOPE_RESULT" = "success"
          test "$CORE_RESULT" = "success"
          if [[ "$BOUNDARY_COUNT" == "0" ]]; then
            test "$BOUNDARY_RESULT" = "skipped"
            not_applicable=true
          else
            test "$BOUNDARY_RESULT" = "success"
            not_applicable=false
          fi
          {
            echo "## Final quality result"
            echo "- tested_head: \`$TESTED_HEAD\`"
            echo "- core_quality: \`$CORE_RESULT\`"
            echo "- package_runtime: \`$CORE_RESULT\`"
            echo "- boundaries_executed: \`$BOUNDARIES\`"
            echo "- boundaries_not_applicable: \`$not_applicable\`"
            echo "- final_result: \`success\`"
          } >> "$GITHUB_STEP_SUMMARY"
