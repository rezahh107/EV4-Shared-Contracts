name: Skeleton Health

on:
  pull_request:
  push:
    branches:
      - main
      - init/non-authoritative-skeleton
      - python-deterministic-core-v1
      - architect-to-ce-transition-v1
      - project-gate-prompt-02-behavioral-coverage
      - project-gate-prompt-03-runner-boundary
      - project-gate-prompt-04-ce-to-builder
      - fix/prompt-05-foundation-reconciliation
  workflow_dispatch:
    inputs:
      expected_head_sha:
        description: Exact commit SHA that this dispatched run must validate.
        required: true
        type: string

permissions:
  contents: read

jobs:
  skeleton:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout exact Project Gate source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          persist-credentials: false

      - name: Assert exact Project Gate PR head
        if: github.event_name == 'pull_request'
        run: test "$(git rev-parse HEAD)" = "${{ github.event.pull_request.head.sha }}"

      - name: Verify dispatched exact head
        if: github.event_name == 'workflow_dispatch'
        env:
          EXPECTED_HEAD_SHA: ${{ inputs.expected_head_sha }}
          TESTED_SHA: ${{ github.sha }}
        run: test "$TESTED_SHA" = "$EXPECTED_HEAD_SHA"

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          version: "0.7.22"
          enable-cache: true

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version-file: .python-version

      - name: Verify uv lockfile
        run: uv lock --check

      - name: Install package
        run: uv sync --locked --extra dev --extra ui

      - name: Verify GitHub Action pins
        run: uv run python scripts/check-github-action-pinning.py

      - name: Verify workflow permissions
        run: uv run python scripts/check-workflow-permissions.py

      - name: Verify capability truth
        run: uv run python scripts/check-capability-truth.py

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 20

      - name: Verify required docs exist
        run: |
          test -f README.md
          test -f docs/ROLE_BOUNDARY_MAP.md
          test -f docs/CONTRACT_INVENTORY.md
          test -f docs/COMPATIBILITY_MAP.md
          test -f docs/MIGRATION_READINESS_CHECKLIST.md
          test -f docs/VALIDATION_STRATEGY.md
          test -f docs/PROMOTION_RULES.md
          test -f docs/KROAD_011_PROJECT_GATE_INTAKE.md
          test -f docs/ADR/0001-non-authoritative-skeleton.md
          test -f schemas/README.md
          test -f fixtures/README.md
          test -f scripts/README.md

      - name: Verify package metadata
        run: node -e "JSON.parse(require('fs').readFileSync('package.json','utf8')); console.log('package.json ok')"

      - name: Run skeleton status
        run: npm run status

      - name: Run skeleton validation
        run: npm run validate

      - name: Verify no specialist canonical schema files exist
        run: |
          allowed='^(schemas/README.md|schemas/stage-bundle/stage-bundle.v1.schema.json|schemas/transition-result/transition-result.v1.schema.json|schemas/architect-to-ce-transition-result/architect-to-ce-transition-result.v1.schema.json|schemas/ce-to-builder-transition-result/ce-to-builder-transition-result.v1.schema.json|schemas/builder-to-responsive-transition-result/builder-to-responsive-transition-result.v1.schema.json|schemas/kernel-decision-intake/kernel-decision-intake.v1.schema.json|schemas/kernel-decision-intake-result/kernel-decision-intake-result.v1.schema.json|schemas/final-gate-result/final-gate-result.v1.schema.json|schemas/diagnostic/diagnostic.v1.schema.json|schemas/lock-manifest/lock-manifest.v1.schema.json|schemas/behavioral-coverage/behavioral-coverage.v1.schema.json|schemas/validator-evidence/validator-evidence.v1.schema.json|schemas/producer-adoption/producer-adoption-set.v1.schema.json|schemas/transition-targets/transition-targets.v1.schema.json)$'
          unexpected=$(find schemas -type f | grep -Ev "$allowed" || true)
          if [ -n "$unexpected" ]; then
            echo "Unexpected schema files found under schemas/."
            printf '%s\n' "$unexpected"
            exit 1
          fi
          echo "Only Project Gate-owned envelope/result/intake/diagnostic/lock/behavioral-coverage/validator-evidence/producer-adoption/transition-target schemas found."

      - name: Record exact tested head
        run: echo "Skeleton Health validated source head ${{ github.sha }}" >> "$GITHUB_STEP_SUMMARY"

  python-core:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout exact Project Gate source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          path: EV4-Project-Gate
          persist-credentials: false

      - name: Assert exact Project Gate PR head
        if: github.event_name == 'pull_request'
        run: test "$(git -C EV4-Project-Gate rev-parse HEAD)" = "${{ github.event.pull_request.head.sha }}"

      - name: Checkout Architect pinned contract repo
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          repository: rezahh107/EV4-Architect-Repo
          ref: be9bdea9ae246b1587043f2582c1a950ea2a6ec5
          path: EV4-Architect-Repo
          persist-credentials: false

      - name: Checkout CE pinned contract repo
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          repository: rezahh107/EV4-Constructability-Engineer-Repo
          ref: 6650c31304e5a0472b276c36018c1df8f42ac983
          path: EV4-Constructability-Engineer-Repo
          persist-credentials: false

      - name: Checkout CE pinned CE-to-Builder repo
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          repository: rezahh107/EV4-Constructability-Engineer-Repo
          ref: cfceec5c20269c75a1cc19b2675d7087cede4599
          path: EV4-Constructability-Engineer-Repo-Prompt04
          persist-credentials: false

      - name: Checkout Builder pinned CE-to-Builder repo
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          repository: rezahh107/EV4-Builder-Assistant-Repo
          ref: 69a2c61edf6d06b4418ad770fcefbfdffcf275d6
          path: EV4-Builder-Assistant-Repo-Prompt04
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          version: "0.7.22"
          enable-cache: true

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version-file: EV4-Project-Gate/.python-version

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 20

      - name: Verify uv lockfile
        working-directory: EV4-Project-Gate
        run: uv lock --check

      - name: Install package
        working-directory: EV4-Project-Gate
        run: uv sync --locked --extra dev --extra ui

      - name: Service layer tests
        working-directory: EV4-Project-Gate
        run: uv run pytest tests/service

      - name: KROAD-011 intake, Final Gate, receipt, and governance tests
        working-directory: EV4-Project-Gate
        run: uv run pytest tests/kernel_decision_intake tests/transitions/test_final_gate.py tests/reports/test_decision_receipts.py tests/planning/test_decision_escape_routes_schema.py

      - name: Operator UI adapter tests
        working-directory: EV4-Project-Gate
        run: uv run pytest tests/ui

      - name: CLI and bundle tests
        working-directory: EV4-Project-Gate
        run: uv run pytest tests/test_cli.py tests/test_canonical_json.py tests/test_bundle_validator.py

      - name: Personal-use package tests
        working-directory: EV4-Project-Gate
        run: uv run pytest --maxfail=1 --tb=short tests/personal_use tests/e2e

      - name: Architect-to-CE transition tests
        working-directory: EV4-Project-Gate
        env:
          EV4_ARCHITECT_REPO: ${{ github.workspace }}/EV4-Architect-Repo
          EV4_CE_REPO: ${{ github.workspace }}/EV4-Constructability-Engineer-Repo
        run: uv run pytest tests/test_architect_to_ce_transition.py

      - name: PG-A2C producer dispatch and adversarial tests
        working-directory: EV4-Project-Gate
        run: uv run pytest -q tests/producer_integration/test_prompt05_producer_integration.py tests/producer_integration/test_pg_a2c_io.py tests/producer_integration/test_pg_a2c_dispatch.py

      - name: Prompt 01 unit tests
        working-directory: EV4-Project-Gate
        run: uv run pytest tests/unit

      - name: Static runner-boundary scanner
        working-directory: EV4-Project-Gate
        run: uv run python scripts/check-runner-boundary.py

      - name: Runner tests
        working-directory: EV4-Project-Gate
        run: uv run pytest tests/runners

      - name: CE-to-Builder transition pytest
        working-directory: EV4-Project-Gate
        run: |
          set -o pipefail
          uv run pytest -vv --tb=short --maxfail=1 tests/transitions/test_ce_to_builder.py 2>&1 | tee c2b-pytest.log

      - name: Prompt-05 transition tests
        working-directory: EV4-Project-Gate
        run: uv run pytest -q tests/transitions/test_builder_to_responsive.py tests/transitions/test_final_gate.py

      - name: Upload CE-to-Builder pytest log
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: c2b-pytest-log
          path: EV4-Project-Gate/c2b-pytest.log
          if-no-files-found: ignore

      - name: Progress tests
        working-directory: EV4-Project-Gate
        run: uv run pytest tests/progress

      - name: Runner boundary tests
        working-directory: EV4-Project-Gate
        run: uv run pytest tests/boundary

      - name: Behavioral coverage validator
        working-directory: EV4-Project-Gate
        run: |
          uv run python scripts/validate-behavioral-rule-coverage.py docs/BEHAVIORAL_RULE_COVERAGE.md
          uv run ev4-transition coverage validate docs/BEHAVIORAL_RULE_COVERAGE.md

      - name: Behavioral fixture validation
        working-directory: EV4-Project-Gate
        run: uv run pytest tests/behavioral_coverage

      - name: Verify external contract lock hashes
        working-directory: EV4-Project-Gate
        env:
          EV4_ARCHITECT_REPO: ${{ github.workspace }}/EV4-Architect-Repo
          EV4_CE_REPO: ${{ github.workspace }}/EV4-Constructability-Engineer-Repo
        run: uv run python scripts/verify-architect-to-ce-lock.py --architect-repo "$EV4_ARCHITECT_REPO" --ce-repo "$EV4_CE_REPO"

      - name: Compute CE-to-Builder lock hashes
        working-directory: EV4-Project-Gate
        env:
          EV4_CE_REPO_PROMPT04: ${{ github.workspace }}/EV4-Constructability-Engineer-Repo-Prompt04
          EV4_BUILDER_REPO_PROMPT04: ${{ github.workspace }}/EV4-Builder-Assistant-Repo-Prompt04
        run: |
          uv run python scripts/compute-ce-to-builder-lock.py \
            --ce-repo "$EV4_CE_REPO_PROMPT04" \
            --builder-repo "$EV4_BUILDER_REPO_PROMPT04" \
            --output c2b-lock-computed.json

      - name: Upload CE-to-Builder computed lock
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: c2b-lock-computed
          path: EV4-Project-Gate/c2b-lock-computed.json
          if-no-files-found: ignore

      - name: CE-to-Builder lock verification
        working-directory: EV4-Project-Gate
        env:
          EV4_CE_REPO_PROMPT04: ${{ github.workspace }}/EV4-Constructability-Engineer-Repo-Prompt04
          EV4_BUILDER_REPO_PROMPT04: ${{ github.workspace }}/EV4-Builder-Assistant-Repo-Prompt04
        run: |
          set -o pipefail
          uv run python scripts/verify-ce-to-builder-lock.py --ce-repo "$EV4_CE_REPO_PROMPT04" --builder-repo "$EV4_BUILDER_REPO_PROMPT04" 2>&1 | tee c2b-lock-verify.log

      - name: Upload CE-to-Builder lock verify log
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: c2b-lock-verify-log
          path: EV4-Project-Gate/c2b-lock-verify.log
          if-no-files-found: ignore

      - name: CE-to-Builder live owner tool smoke
        working-directory: EV4-Project-Gate
        env:
          EV4_CE_REPO_PROMPT04: ${{ github.workspace }}/EV4-Constructability-Engineer-Repo-Prompt04
          EV4_BUILDER_REPO_PROMPT04: ${{ github.workspace }}/EV4-Builder-Assistant-Repo-Prompt04
        run: |
          set -o pipefail
          uv run python scripts/ce-to-builder-smoke.py \
            --ce-repo "$EV4_CE_REPO_PROMPT04" \
            --builder-repo "$EV4_BUILDER_REPO_PROMPT04" \
            --fixture "$EV4_CE_REPO_PROMPT04/tests/role-alignment/valid/executable_visual_reference_package.json" 2>&1 | tee c2b-smoke.log

      - name: Upload CE-to-Builder smoke log
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: c2b-smoke-log
          path: EV4-Project-Gate/c2b-smoke.log
          if-no-files-found: ignore

      - name: CLI smoke valid bundle
        working-directory: EV4-Project-Gate
        run: uv run ev4-transition validate fixtures/valid/architect-stage-bundle.v1.json

      - name: CLI smoke invalid array
        working-directory: EV4-Project-Gate
        run: |
          set +e
          uv run ev4-transition validate fixtures/invalid/array-input.v1.json
          status=$?
          test "$status" -eq 1

      - name: CLI smoke Persian insufficient evidence
        working-directory: EV4-Project-Gate
        run: |
          set +e
          output=$(uv run ev4-transition validate fixtures/insufficient-evidence/architect-stage-bundle.v1.json --format persian)
          status=$?
          printf '%s\n' "$output"
          test "$status" -eq 2
          printf '%s' "$output" | grep 'شواهد کافی نیست'

      - name: Official Architect validator fixture suite
        working-directory: EV4-Architect-Repo
        env:
          PROJECT_GATE_PYTHON: ${{ github.workspace }}/EV4-Project-Gate/.venv/bin/python
        run: '"$PROJECT_GATE_PYTHON" scripts/check-architect-stage-payload.py'

      - name: Official CE validator fixture suite
        working-directory: EV4-Constructability-Engineer-Repo
        env:
          PROJECT_GATE_PYTHON: ${{ github.workspace }}/EV4-Project-Gate/.venv/bin/python
        run: '"$PROJECT_GATE_PYTHON" scripts/validate-ce-architect-stage-intake.py'

      - name: Generated Architect-to-CE transition smoke and CE binding
        working-directory: EV4-Project-Gate
        env:
          EV4_ARCHITECT_REPO: ${{ github.workspace }}/EV4-Architect-Repo
          EV4_CE_REPO: ${{ github.workspace }}/EV4-Constructability-Engineer-Repo
        run: uv run python scripts/transition-smoke.py --architect-repo "$EV4_ARCHITECT_REPO" --ce-repo "$EV4_CE_REPO"

      - name: Current-head Architect export to standalone CE input
        working-directory: EV4-Project-Gate
        env:
          EV4_ARCHITECT_REPO: ${{ github.workspace }}/EV4-Architect-Repo
          EV4_CE_REPO: ${{ github.workspace }}/EV4-Constructability-Engineer-Repo
        run: |
          uv run python scripts/pg-a2c-current-head-smoke.py \
            --architect-repo "$EV4_ARCHITECT_REPO" \
            --ce-repo "$EV4_CE_REPO" \
            --evidence-dir pg-a2c-exact-head-evidence

      - name: Upload PG-A2C exact-head evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: pg-a2c-exact-head-${{ github.event.pull_request.head.sha || github.sha }}
          path: EV4-Project-Gate/pg-a2c-exact-head-evidence
          if-no-files-found: error
          retention-days: 14

      - name: Record exact tested head
        run: echo "Python core validated source head ${{ github.sha }}" >> "$GITHUB_STEP_SUMMARY"
