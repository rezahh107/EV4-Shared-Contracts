name: Project Gate Validation

on:
  pull_request:
  push:
    branches:
      - main
      - refactor/python-transition-engine

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install package
        run: python -m pip install -e '.[dev]'

      - name: Run tests
        run: pytest

      - name: CLI smoke validate
        run: ev4-transition validate fixtures/valid/architect-stage-bundle.v1.json

      - name: CLI smoke transition
        run: ev4-transition transition fixtures/valid/architect-stage-bundle.v1.json --transition-id architect-to-ce.v1

      - name: CLI smoke Persian insufficient evidence
        run: |
          set +e
          output=$(ev4-transition validate fixtures/invalid/insufficient-evidence.v1.json --format persian)
          status=$?
          printf '%s\n' "$output"
          test "$status" -eq 2
          printf '%s' "$output" | grep 'شواهد کافی نیست'
