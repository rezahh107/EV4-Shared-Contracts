name: Historical Merge Ledger

on:
  pull_request:
    types:
      - closed

permissions:
  actions: read
  contents: write
  pull-requests: read

concurrency:
  group: historical-merge-ledger-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  update-ledger:
    if: github.event.pull_request.merged == true && github.event.pull_request.base.ref == 'main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: main

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 20

      - name: Resolve merged PR validation status
        env:
          MERGED_PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          status_json=$(curl -fsSL "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/runs?head_sha=${MERGED_PR_HEAD_SHA}&event=pull_request" || echo '{}')
          conclusion=$(printf '%s' "$status_json" | node -e "let data=''; process.stdin.on('data', c => data += c); process.stdin.on('end', () => { const runs = JSON.parse(data).workflow_runs || []; const run = runs.find(item => item.name === 'Skeleton Health'); process.stdout.write(run && run.conclusion ? run.conclusion : ''); });")

          case "$conclusion" in
            success) health="CI_PASSED" ;;
            failure|cancelled|timed_out|action_required) health="CI_FAILED" ;;
            '') health="CI_NOT_VERIFIED" ;;
            *) health="CI_PENDING" ;;
          esac

          echo "MERGED_PR_SKELETON_HEALTH=$health" >> "$GITHUB_ENV"

      - name: Update historical ledger
        env:
          MERGED_PR_NUMBER: ${{ github.event.pull_request.number }}
          MERGED_PR_TITLE: ${{ github.event.pull_request.title }}
          MERGED_PR_HEAD_BRANCH: ${{ github.event.pull_request.head.ref }}
          MERGED_PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          MERGED_PR_MERGE_SHA: ${{ github.event.pull_request.merge_commit_sha }}
        run: node scripts/update-status-after-merge.js

      - name: Commit historical ledger update
        run: |
          if git diff --quiet -- docs/EV4_SHARED_CONTRACTS_STATUS.md; then
            echo "No historical ledger update needed."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/EV4_SHARED_CONTRACTS_STATUS.md
          git commit -m "docs: record merged PR #${{ github.event.pull_request.number }} in historical ledger"
          git push
