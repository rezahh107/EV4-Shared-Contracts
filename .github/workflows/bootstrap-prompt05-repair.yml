name: Bootstrap Prompt 05 Repair

on:
  push:
    branches:
      - fix/prompt-05-foundation-reconciliation
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repair branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Checkout pinned Builder repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          repository: rezahh107/EV4-Builder-Assistant-Repo
          ref: 69a2c61edf6d06b4418ad770fcefbfdffcf275d6
          path: .owner/EV4-Builder-Assistant-Repo
          persist-credentials: false

      - name: Checkout pinned Responsive repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          repository: rezahh107/EV4-Responsive-Architect
          ref: df74c7ba2ffbed1a4136b5ea6be6ce30db4e161a
          path: .owner/EV4-Responsive-Architect
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.11'

      - name: Apply deterministic repair patch
        run: python scripts/bootstrap-prompt05-repair.py --apply

      - name: Preserve version-one compatibility aliases
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          capability_path = Path('src/ev4_transition/data/capability-status.v1.json')
          capability = json.loads(capability_path.read_text(encoding='utf-8'))
          capability['evidence']['current_main_head_ci'] = dict(capability['evidence']['foundation_main_head_ci'])
          capability_path.write_text(json.dumps(capability, ensure_ascii=False, indent=2, sort_keys=True) + '\n', encoding='utf-8')

          status_path = Path('docs/IMPLEMENTATION_STATUS.yaml')
          text = status_path.read_text(encoding='utf-8')
          anchor = '  foundation_main_head_ci:\n    status: insufficient_evidence\n    reason: no_visible_exact_head_run_for_automatic_historical_ledger_commit\n'
          compatibility = (
              '  audited_main_head: 4233d2ff22310f86305b2e67055c8e4eeb03d6df\n'
              '  current_main_head_ci:\n'
              '    status: insufficient_evidence\n'
              '    reason: no_visible_exact_head_run_for_automatic_historical_ledger_commit\n'
              '  pull_request_20:\n'
              '    state: merged\n'
              '    head_sha: 42bfa484481c585f589d86c40424660c70b038a0\n'
              '    merge_commit_sha: 34b08240ad4deaf017a8f79236d0b8e214530dec\n'
              '    workflow_run_id: 28744810186\n'
              '    workflow_result: success\n'
          )
          if '  pull_request_20:\n' not in text:
              if anchor not in text:
                  raise SystemExit('implementation status compatibility anchor missing')
              text = text.replace(anchor, anchor + compatibility, 1)
          status_path.write_text(text, encoding='utf-8')
          PY

      - name: Install repaired package
        run: python -m pip install -e '.[dev]'

      - name: Compute immutable Builder to Responsive lock
        run: |
          python scripts/compute-builder-to-responsive-lock.py \
            --builder-repo .owner/EV4-Builder-Assistant-Repo \
            --responsive-repo .owner/EV4-Responsive-Architect \
            --output contracts/locks/builder-to-responsive-transition.v1.lock.json

      - name: Run Builder to Responsive tests
        run: pytest -vv --tb=short tests/transitions/test_builder_to_responsive.py

      - name: Run Final Gate tests
        run: pytest -vv --tb=short tests/transitions/test_final_gate.py

      - name: Run capability and CLI tests
        run: pytest -vv --tb=short tests/test_cli.py

      - name: Commit non-circular Builder to Responsive foundation
        id: stage1
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Fix Prompt-05 deterministic foundations [skip ci]"
          git push origin HEAD:fix/prompt-05-foundation-reconciliation
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Finalize immutable Project Gate pin and final lock
        run: |
          python scripts/bootstrap-prompt05-repair.py --finalize-commit "${{ steps.stage1.outputs.sha }}"
          python scripts/compute-final-gate-lock.py \
            --project-gate-repo . \
            --responsive-repo .owner/EV4-Responsive-Architect \
            --output contracts/locks/final-gate.v1.lock.json

      - name: Remove bootstrap surfaces
        run: rm scripts/bootstrap-prompt05-repair.py .github/workflows/bootstrap-prompt05-repair.yml

      - name: Validate finalized repair before publishing
        run: |
          python scripts/check-github-action-pinning.py
          pytest -vv --tb=short tests/transitions/test_builder_to_responsive.py tests/transitions/test_final_gate.py tests/test_cli.py

      - name: Commit finalized Prompt-05 repair
        run: |
          git add -A
          git commit -m "Finalize Prompt-05 immutable locks and CI gates [skip ci]"
          git push origin HEAD:fix/prompt-05-foundation-reconciliation

      - name: Trigger repository validation
        run: |
          git commit --allow-empty -m "Trigger Prompt-05 exact-head validation"
          git push origin HEAD:fix/prompt-05-foundation-reconciliation
