name: Temporary Full Suite Diagnosis

on:
  pull_request:
    paths:
      - ".github/workflows/diagnose-full-suite.yml"

permissions:
  contents: read

jobs:
  diagnose-first-failure:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Fetch exact PR Head
        shell: bash
        env:
          TESTED_HEAD: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          git init --quiet .
          git remote add origin "https://github.com/${GITHUB_REPOSITORY}.git"
          git fetch --quiet --depth=1 origin "$TESTED_HEAD"
          git checkout --quiet --detach FETCH_HEAD
          test "$(git rev-parse HEAD)" = "$TESTED_HEAD"

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          version: "0.7.22"
          enable-cache: false

      - name: Install locked project
        run: uv sync --locked --extra dev --extra ui --quiet

      - name: Report first full-suite failure
        run: uv run pytest -x -q --tb=short
