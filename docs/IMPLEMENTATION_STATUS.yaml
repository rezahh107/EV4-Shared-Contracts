ci_baseline:
  workflow: .github/workflows/validate.yml
  jobs:
    skeleton:
      status: configured
      checks:
        - required docs exist
        - package metadata parses
        - npm run status
        - npm run validate
        - no unexpected schema files under schemas/
    python_core:
      status: configured
      checks:
        - checkout Project Gate
        - checkout pinned Architect repo
        - checkout pinned CE repo
        - install Python package
        - pytest
        - verify external contract lock hashes
        - CLI smoke valid bundle
        - CLI smoke invalid array
        - CLI smoke Persian insufficient evidence
        - official Architect validator fixture suite
        - official CE validator fixture suite
        - generated Architect-to-CE transition smoke and CE binding
  ci_result_for_this_prompt: not_run_by_assistant

live_specialist_boundary_baseline:
  architect:
    repository: rezahh107/EV4-Architect-Repo
    authoritative_for: Architect Stage Payload, architecture decisions, semantic validation, fixtures
    canonical_project_gate_source_payload: ev4-architect-stage-payload@1.0.0
    official_validator: scripts/check-architect-stage-payload.py
    boundary: no constructability proof, no Builder execution authorization, no Responsive or production claims
  ce:
    repository: rezahh107/EV4-Constructability-Engineer-Repo
    authoritative_for: constructability review, implementation strategy proof, CE Architect intake, Builder executable package semantics
    canonical_architect_facing_intake: ev4-ce-architect-stage-intake@1.1.0
    official_intake_validator: scripts/validate-ce-architect-stage-intake.py
    ce_to_builder_source_contract: ev4-builder-executable-package@1.0.0
    boundary: not_proven_executable_means_not_builder_ready
  builder:
    repository: rezahh107/EV4-Builder-Assistant-Repo
    authoritative_for: Builder runtime intake, CE-to-Builder contract gate, Builder adapter, runtime validation, Builder evidence
    runtime_intake_schema: ev4-builder-context-package@1.0.0
    ce_to_builder_gate: scripts/validate-ce-to-builder-contract-gate.mjs
    ce_to_builder_adapter: scripts/normalize-ce-builder-executable-package.mjs
    boundary: consumes only executable-ready input; does not choose architecture or implementation strategy; does not invent evidence
  responsive:
    repository: rezahh107/EV4-Responsive-Architect
    authoritative_for: Responsive input eligibility, responsive output, viewport evidence, repair semantics
    builder_specific_input_schema: ev4-builder-responsive-input@0.1.0
    builder_specific_input_validator: validation/e2e/run_builder_responsive_input_boundary_check.py
    responsive_output_schema: ev4-responsive-output@0.3.0
    responsive_output_validator: validation/e2e/run_responsive_tree_architecture_refactor_check.py
    boundary: input eligibility is not responsive correctness; screenshots are evidence only

confirmed_drifts_or_stale_docs:
  - id: DRIFT-A2C-STATUS-ARCHITECT-README
    severity: medium
    description: Architect README still says Project Gate Architect-to-CE transition is not implemented, while live Project Gate README and CI show it is implemented in Project Gate.
    preferred_source: EV4-Project-Gate README and AGENTS for Project Gate implementation status
  - id: DRIFT-B2R-RESPONSIVE-INPUT
    severity: high
    description: Project Gate compatibility/freeze docs still say Responsive Builder-specific input schema is not implemented, but live Responsive repo now has schema-bound non-executing ev4-builder-responsive-input@0.1.0 and validator.
    preferred_source: EV4-Responsive-Architect live contract/schema for Responsive-owned input status
  - id: STATUS-MODEL-NAMING-DRIFT
    severity: high
    description: Uploaded hard rules use transition statuses accepted/repair_needed/insufficient_evidence/invalid, while current Project Gate validation-result schemas use valid/invalid/insufficient_evidence.
    preferred_source: current repository schemas for implemented code; hard rules for future transition decision model alignment

critical_or_high_gaps:
  - id: GAP-BRC-DOC
    severity: high
    description: Behavioral rule coverage file was absent before this prompt; baseline created but enforcement validator/fixture/CI for the coverage ledger is not implemented yet.
  - id: GAP-CE-BUILDER-PG
    severity: critical
    description: CE-to-Builder Project Gate transition is not implemented; no Project Gate lock manifest or Python orchestration for Builder gate/adapter yet.
  - id: GAP-BUILDER-RESPONSIVE-PG
    severity: critical
    description: Builder-to-Responsive Project Gate transition is not implemented; no accepted handoff can be emitted without real Builder evidence and Responsive boundary validation.
  - id: GAP-FINAL-EVIDENCE
    severity: critical
    description: Final evidence gate is not implemented; no production/final readiness should be claimed.
  - id: GAP-REAL-EVIDENCE
    severity: critical
    description: Real Elementor/frontend/responsive/export/accessibility evidence remains unavailable or unverified.
  - id: GAP-STATUS-MODEL
    severity: high
    description: Existing schemas use valid/invalid/insufficient_evidence; future Project Gate transition model requires accepted/repair_needed/insufficient_evidence/invalid.

remaining_insufficient_evidence:
  - real_elementor_artifact_validation
  - real_cross_repository_validation_beyond_synthetic_fixtures
  - CE-to-Builder Project Gate pin/hash lock and transition result schema
  - Builder-to-Responsive formal Builder export package or Project Gate transport contract
  - Responsive Builder input validation against real verified Builder evidence
  - downstream rejection evidence for real invalid handoffs
  - final evidence gate policy and fixtures

